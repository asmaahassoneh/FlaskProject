<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Student Portal{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">🎓 Student Portal v1</div>

        <div class="links">
          <a href="{{ url_for('student_bp.home') }}">Home</a>
          <a href="{{ url_for('student_bp.register_student') }}">Register</a>
          <a href="{{ url_for('student_bp.list_students') }}">Students</a>
        </div>
      </div>
    </nav>

    <main class="container">{% block content %}{% endblock %}</main>
  </body>
</html>
